<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A Message for Kanak</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&family=Dancing+Script:wght@700&display=swap');

        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #0f172a; color: white; overflow-x: hidden; }
        .cursive { font-family: 'Dancing Script', cursive; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(16px); border: 1px solid rgba(255, 255, 255, 0.1); }
        
        /* Card Flip Logic */
        .card-inner { transition: transform 0.6s; transform-style: preserve-3d; cursor: pointer; }
        .flipped { transform: rotateY(180deg); }
        .card-front, .card-back { backface-visibility: hidden; position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
        .card-back { transform: rotateY(180deg); }
        
        #mainPage, #cardsPage { display: none; opacity: 0; transition: opacity 0.8s ease; }
        .locked { filter: grayscale(1) brightness(0.5); cursor: not-allowed !important; }

        @keyframes float { 0%, 100% { transform: translateY(0px); } 50% { transform: translateY(-10px); } }
        .animate-float { animation: float 4s ease-in-out infinite; }
    </style>
</head>
<body>

    <canvas id="canvas" class="fixed inset-0 pointer-events-none z-0"></canvas>

    <section id="introPage" class="relative z-10 h-screen flex flex-col items-center justify-center p-6 text-center">
        <div class="animate-float mb-8">
            <h2 class="text-3xl md:text-5xl font-extrabold tracking-tight mb-4">
                Here's the word that I believe <br>
                <span class="text-yellow-400 font-black italic">fits you best...</span>
            </h2>
        </div>
        <button onclick="showMainPage()" class="bg-yellow-500 hover:bg-yellow-400 text-black px-12 py-5 rounded-full font-bold text-xl flex items-center gap-3 transition-transform hover:scale-105">
            <i data-lucide="heart" class="fill-current"></i>
            Click Me
        </button>
    </section>

    <section id="mainPage" class="relative z-10 min-h-screen p-6">
        <div class="max-w-3xl mx-auto text-center mt-20">
            <h1 class="text-6xl md:text-8xl font-black mb-6 text-yellow-400">HAPPY BIRTHDAY!</h1>
            
            <div class="glass p-8 md:p-12 rounded-[2.5rem] border-t border-white/20 mb-10">
                <p id="birthdayMessage" class="text-xl md:text-2xl leading-relaxed text-slate-200">
                    (Your custom birthday message will go right here, Kanak!)
                </p>
                
                <div class="flex flex-wrap justify-center gap-6 mt-10">
                    <button onclick="launchFireworks()" class="bg-yellow-500 text-black font-bold py-4 px-10 rounded-full flex items-center gap-2 hover:bg-yellow-400 transition-all">
                        <i data-lucide="clapperboard"></i> Cheers!
                    </button>
                    <button onclick="showCardsPage()" class="glass border-yellow-500/50 py-4 px-10 rounded-full flex items-center gap-2 hover:bg-white/10 transition-all">
                        <i data-lucide="layers" class="text-yellow-400"></i> The 20-Day Journey
                    </button>
                </div>
            </div>
        </div>
    </section>

    <section id="cardsPage" class="relative z-10 min-h-screen p-6 pb-20">
        <button onclick="backToMain()" class="mb-8 flex items-center gap-2 opacity-60 hover:opacity-100 transition-all">
            <i data-lucide="arrow-left"></i> Back
        </button>
        <h2 class="text-4xl font-bold text-center mb-12 cursive text-yellow-400">20 Days of You</h2>
        
        <div class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-5 gap-6 max-w-6xl mx-auto" id="cardsGrid">
            </div>
    </section>

    <script>
        lucide.createIcons();

        // 1. Navigation Logic
        function showMainPage() {
            document.getElementById('introPage').style.display = 'none';
            const page = document.getElementById('mainPage');
            page.style.display = 'block';
            setTimeout(() => page.style.opacity = '1', 50);
            initStartDate(); // Start the 20-day clock
        }

        function showCardsPage() {
            document.getElementById('mainPage').style.display = 'none';
            const page = document.getElementById('cardsPage');
            page.style.display = 'block';
            setTimeout(() => page.style.opacity = '1', 50);
            renderCards();
        }

        function backToMain() {
            document.getElementById('cardsPage').style.display = 'none';
            document.getElementById('mainPage').style.display = 'block';
        }

        // 2. The 20-Day Lock Logic
        function initStartDate() {
            if (!localStorage.getItem('birthdayJourneyStart')) {
                localStorage.setItem('birthdayJourneyStart', new Date().getTime());
            }
        }

        const cardContent = [
            { word: "Radiant", note: "Because you light up every room you walk into." },
            { word: "Day 2 Word", note: "The note for Day 2 goes here..." },
            // ... I will fill all 20 once you provide the words/notes
        ];

        function renderCards() {
            const grid = document.getElementById('cardsGrid');
            grid.innerHTML = '';
            const startTime = parseInt(localStorage.getItem('birthdayJourneyStart'));
            const now = new Date().getTime();

            for (let i = 0; i < 20; i++) {
                const daysElapsed = Math.floor((now - startTime) / (1000 * 60 * 60 * 24));
                const isLocked = i > daysElapsed;
                
                // Calculate time remaining for the next card
                const unlockTime = startTime + (i * 24 * 60 * 60 * 1000);
                const timeLeft = unlockTime - now;
                const hoursLeft = Math.ceil(timeLeft / (1000 * 60 * 60));

                const card = document.createElement('div');
                card.className = `relative h-64 perspective-1000 ${isLocked ? 'locked' : ''}`;
                
                card.innerHTML = `
                    <div class="card-inner w-full h-full glass rounded-2xl ${isLocked ? '' : 'hover-flip'}" onclick="${isLocked ? '' : 'this.classList.toggle(\'flipped\')'}">
                        <div class="card-front flex flex-col items-center justify-center p-4 text-center">
                            <span class="text-sm opacity-50 mb-2">Day ${i + 1}</span>
                            <h3 class="text-xl font-bold text-yellow-400">${isLocked ? '<i data-lucide="lock" class="mx-auto"></i>' : cardContent[i]?.word || 'Word'}</h3>
                            ${isLocked ? `<p class="text-[10px] mt-2">Unlocks in ${Math.floor(i - (now-startTime)/(86400000))}d ${hoursLeft % 24}h</p>` : ''}
                        </div>
                        <div class="card-back glass bg-yellow-500/10 flex items-center justify-center p-6 text-center rounded-2xl">
                            <p class="text-sm italic">"${cardContent[i]?.note || 'Your note here'}"</p>
                        </div>
                    </div>
                `;
                grid.appendChild(card);
            }
            lucide.createIcons();
        }

        // 3. Fireworks (Cheers) Logic - [Reusing your engine]
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        let particles = [];
        function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
        window.addEventListener('resize', resize);
        resize();

        class Particle {
            constructor(x, y, color) {
                this.x = x; this.y = y; this.color = color;
                this.velocity = { x: (Math.random() - 0.5) * 8, y: (Math.random() - 0.5) * 8 };
                this.alpha = 1; this.friction = 0.95;
            }
            draw() {
                ctx.globalAlpha = this.alpha;
                ctx.beginPath(); ctx.arc(this.x, this.y, 2, 0, Math.PI * 2);
                ctx.fillStyle = this.color; ctx.fill();
            }
            update() {
                this.velocity.x *= this.friction; this.velocity.y *= this.friction;
                this.x += this.velocity.x; this.y += this.velocity.y;
                this.alpha -= 0.01;
            }
        }

        function launchFireworks() {
            const colors = ['#fbbf24', '#f59e0b', '#ffffff', '#a855f7'];
            for (let j = 0; j < 5; j++) {
                setTimeout(() => {
                    const x = Math.random() * canvas.width;
                    const y = Math.random() * canvas.height * 0.5;
                    for (let i = 0; i < 40; i++) {
                        particles.push(new Particle(x, y, colors[Math.floor(Math.random() * colors.length)]));
                    }
                }, j * 200);
            }
        }

        function animate() {
            ctx.fillStyle = 'rgba(15, 23, 42, 0.2)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            particles.forEach((p, i) => {
                if (p.alpha > 0) { p.update(); p.draw(); }
                else { particles.splice(i, 1); }
            });
            requestAnimationFrame(animate);
        }
        animate();
    </script>
</body>
</html>
